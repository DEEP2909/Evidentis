name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================
  # Node.js Checks (API + Web + Shared)
  # ============================================================
  node-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_DB: evidentis_test
          POSTGRES_USER: evidentis
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @evidentis/shared

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run API migrations
        run: npm run migrate:up -w @evidentis/api
        env:
          DATABASE_URL: postgresql://evidentis:test_password@localhost:5432/evidentis_test
          NODE_ENV: test

      - name: Run tests with coverage
        run: npm run test:coverage:ci -w @evidentis/api
        env:
          DATABASE_URL: postgresql://evidentis:test_password@localhost:5432/evidentis_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 65" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 65% threshold"
            exit 1
          fi

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=critical

  # ============================================================
  # Python Checks (AI Service)
  # ============================================================
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd apps/ai-service
          pip install -r requirements.txt
          pip install pip-audit

      - name: Lint with Ruff
        run: |
          cd apps/ai-service
          ruff check .

      - name: Type check with mypy
        run: |
          cd apps/ai-service
          mypy . --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          cd apps/ai-service
          pytest tests/ -v --tb=short --cov=. --cov-config=.coveragerc --cov-report=json

      - name: Check coverage threshold
        run: |
          cd apps/ai-service
          COVERAGE=$(python -c "import json; d=json.load(open('coverage.json')); print(d['totals']['percent_covered'])")
          echo "Coverage: $COVERAGE%"
          python -c "import sys; sys.exit(0 if $COVERAGE >= 70 else 1)"

      - name: Audit dependencies
        run: |
          pip-audit -r apps/ai-service/requirements.txt

  # ============================================================
  # Security Scanning
  # ============================================================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep (Node.js)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/nodejs
            p/typescript

      - name: Run Semgrep (Python)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/flask

  # ============================================================
  # Tenant Isolation Test
  # ============================================================
  tenant-isolation-test:
    runs-on: ubuntu-latest
    needs: node-checks
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_DB: evidentis_test
          POSTGRES_USER: evidentis
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @evidentis/shared

      - name: Run migrations
        run: npm run migrate:up -w @evidentis/api
        env:
          DATABASE_URL: postgresql://evidentis:test_password@localhost:5432/evidentis_test

      - name: Run tenant isolation tests
        run: npm run test:isolation -w @evidentis/api
        env:
          DATABASE_URL: postgresql://evidentis:test_password@localhost:5432/evidentis_test
          NODE_ENV: test

  # ============================================================
  # Docker Build Test
  # ============================================================
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile.api
          push: false
          tags: evidentis-api:test

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.web
          push: false
          tags: evidentis-web:test

      - name: Build AI Service image
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: false
          tags: evidentis-ai-service:test

  # ============================================================
  # Container Security Scanning
  # ============================================================
  container-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile.api
          push: false
          load: true
          tags: evidentis-api:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'evidentis-api:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
          trivyignores: '.trivyignore'

  # ============================================================
  # E2E Tests (Playwright)
  # ============================================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [node-checks, docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E smoke tests
        run: npm run test:e2e:ci -w @evidentis/web
        env:
          CI: true

  # ============================================================
  # AI Model Evaluation
  # ============================================================
  ai-evaluation:
    runs-on: ubuntu-latest
    needs: python-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd apps/ai-service
          pip install -r requirements.txt

      - name: Run AI evaluation suite
        run: |
          cd apps/ai-service
          python -m evaluation.evaluator --output evaluation-results.json
        env:
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          AI_EVAL_MODE: ci

      - name: Check evaluation scores
        run: |
          cd apps/ai-service
          python -c "
          import json
          import sys
          
          with open('evaluation-results.json') as f:
              results = json.load(f)
          
          # Define thresholds
          THRESHOLDS = {
              'clause_extraction_accuracy': 0.85,
              'risk_assessment_precision': 0.80,
              'risk_assessment_recall': 0.75,
              'obligation_extraction_accuracy': 0.80,
              'redline_suggestion_relevance': 0.70,
          }
          
          failed = []
          for metric, threshold in THRESHOLDS.items():
              score = results.get('scores', {}).get(metric, 0)
              if score < threshold:
                  failed.append(f'{metric}: {score:.2%} < {threshold:.0%}')
              else:
                  print(f'✓ {metric}: {score:.2%} >= {threshold:.0%}')
          
          if failed:
              print('\\n❌ Evaluation failed:')
              for f in failed:
                  print(f'  - {f}')
              sys.exit(1)
          else:
              print('\\n✓ All evaluation metrics passed!')
          "

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: ai-evaluation-results
          path: apps/ai-service/evaluation-results.json

  # ============================================================
  # AI Regression Tests
  # ============================================================
  ai-regression:
    runs-on: ubuntu-latest
    needs: ai-evaluation
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r apps/ai-service/requirements.txt

      - name: Compare evaluation results
        run: |
          python -c "
          import json
          import sys
          
          # Load current results
          with open('apps/ai-service/evaluation-results.json') as f:
              current = json.load(f)
          
          # Load base results (if exists)
          try:
              with open('base/apps/ai-service/evaluation-results.json') as f:
                  base = json.load(f)
          except FileNotFoundError:
              print('No base evaluation results found, skipping regression check')
              sys.exit(0)
          
          # Check for regressions
          regressions = []
          REGRESSION_THRESHOLD = 0.05  # 5% regression allowed
          
          for metric in current.get('scores', {}).keys():
              current_score = current['scores'].get(metric, 0)
              base_score = base.get('scores', {}).get(metric, 0)
              
              if base_score > 0 and current_score < base_score - REGRESSION_THRESHOLD:
                  regressions.append(f'{metric}: {current_score:.2%} (was {base_score:.2%})')
          
          if regressions:
              print('⚠️ AI performance regressions detected:')
              for r in regressions:
                  print(f'  - {r}')
              # Warning only, don't fail the build
              print('\\nPlease review these regressions before merging.')
          else:
              print('✓ No AI performance regressions detected')
          "
