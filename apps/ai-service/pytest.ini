[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
norecursedirs = pytest-cache-files-* .pytest_cache .mypy_cache .ruff_cache
filterwarnings =
    ignore::pytest.PytestDeprecationWarning
    ignore::DeprecationWarning
addopts = -p no:cacheprovider --cov=apps/ai-service --cov-config=apps/ai-service/.coveragerc --cov-report=json --cov-report=term
