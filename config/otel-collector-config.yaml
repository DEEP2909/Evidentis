# EvidentIS OpenTelemetry Collector Configuration
# Collects traces, metrics, and logs from all services

receivers:
  # OTLP receiver for application telemetry
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus receiver for scraping metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'evidentis-api'
          scrape_interval: 15s
          static_configs:
            - targets: ['api:3001']
          metrics_path: /metrics
        
        - job_name: 'evidentis-ai-service'
          scrape_interval: 15s
          static_configs:
            - targets: ['ai-service:8000']
          metrics_path: /metrics

  # Host metrics for container monitoring
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      network:
      load:

  # Docker stats for container metrics
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s

processors:
  # Batch processor for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

  # Resource detection for cloud metadata
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 5s
    override: false

  # Add common attributes
  attributes:
    actions:
      - key: environment
        value: ${ENVIRONMENT:-production}
        action: upsert
      - key: service.namespace
        value: evidentis
        action: upsert
      - key: deployment.environment
        value: ${ENVIRONMENT:-production}
        action: upsert

  # Filter out health check noise
  filter/health:
    spans:
      exclude:
        match_type: regexp
        span_names:
          - "GET /health"
          - "GET /healthz"
          - "GET /ready"
          - "GET /metrics"

  # Tail sampling for traces (sample interesting traces)
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      # Always sample errors
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      # Always sample slow requests (>2s)
      - name: slow-requests
        type: latency
        latency:
          threshold_ms: 2000
      # Sample 10% of successful traces
      - name: probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

exporters:
  # Logging exporter for debugging
  logging:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: evidentis
    const_labels:
      environment: ${ENVIRONMENT:-production}

  # OTLP exporter for Jaeger/Tempo
  otlp/jaeger:
    endpoint: ${JAEGER_ENDPOINT:-jaeger:4317}
    tls:
      insecure: true

  # OTLP exporter for cloud providers (Datadog, New Relic, etc.)
  otlp/cloud:
    endpoint: ${OTLP_ENDPOINT:-localhost:4317}
    headers:
      api-key: ${OTLP_API_KEY:-}
    tls:
      insecure: ${OTLP_INSECURE:-true}

  # Loki exporter for logs
  loki:
    endpoint: ${LOKI_ENDPOINT:-http://loki:3100/loki/api/v1/push}
    labels:
      attributes:
        service.name: "service_name"
        service.namespace: "service_namespace"
        severity: "severity"
      resource:
        deployment.environment: "environment"

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/health"

  # pprof extension for profiling
  pprof:
    endpoint: 0.0.0.0:1777

  # zpages for debugging
  zpages:
    endpoint: 0.0.0.0:55679

  # Memory ballast for performance
  memory_ballast:
    size_mib: 128

service:
  extensions: [health_check, pprof, zpages, memory_ballast]
  
  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/health, tail_sampling, resourcedetection, attributes, batch]
      exporters: [logging, otlp/jaeger]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus, hostmetrics, docker_stats]
      processors: [memory_limiter, resourcedetection, attributes, batch]
      exporters: [prometheus]

    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, attributes, batch]
      exporters: [logging, loki]

  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      level: detailed
      address: 0.0.0.0:8888
