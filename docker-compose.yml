services:
  # ============================================================
  # PostgreSQL with pgvector extension
  # ============================================================
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: evidentis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evidentis
      POSTGRES_USER: evidentis
      POSTGRES_PASSWORD: evidentis_dev_password
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentis"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evidentis-network

  # ============================================================
  # Redis for BullMQ and caching
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: evidentis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evidentis-network

  # ============================================================
  # MinIO (S3-compatible object storage for local dev)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: evidentis-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evidentis-network

  # ============================================================
  # ClamAV Antivirus Scanner
  # ============================================================
  clamav:
    image: clamav/clamav:stable
    container_name: evidentis-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - evidentis-network

  # ============================================================
  # Ollama LLM Server (optional - enable with --profile llm)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: evidentis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evidentis-network

  # ============================================================
  # Python AI Service (FastAPI)
  # ============================================================
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: evidentis-ai-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_CACHE_DIR=/models
      - EMBEDDING_MODEL=sentence-transformers/LaBSE
      - EMBEDDING_DIM=768
      - AI_SERVICE_INTERNAL_KEY=${AI_SERVICE_INTERNAL_KEY:-}
      - OCR_ENGINES=tesseract
      - GPU_ENABLED=false
    volumes:
      - model_cache:/models
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/ready"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 1800s
    networks:
      - evidentis-network

  # ============================================================
  # Python Celery AI Worker
  # ============================================================
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile
    container_name: evidentis-ai-worker
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - AI_SERVICE_URL=http://ai-service:5000
      - API_SERVICE_URL=http://api:4000
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - evidentis-network

  # ============================================================
  # Node.js API Server (Fastify)
  # ============================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.api
    container_name: evidentis-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://evidentis:evidentis_dev_password@postgres:5432/evidentis
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:5000
      - AI_SERVICE_INTERNAL_KEY=${AI_SERVICE_INTERNAL_KEY:-}
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=evidentis-documents
      - S3_ACCESS_KEY=minio_admin
      - S3_SECRET_KEY=minio_dev_password
      - MALWARE_SCANNER=clamav
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - SEED_DEMO_DATA=true
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health/live', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evidentis-network

  # ============================================================
  # Node.js BullMQ Worker
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.api
    container_name: evidentis-worker
    restart: unless-stopped
    command: ["node", "dist/worker-main.js"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://evidentis:evidentis_dev_password@postgres:5432/evidentis
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:5000
      - AI_SERVICE_INTERNAL_KEY=${AI_SERVICE_INTERNAL_KEY:-}
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=evidentis-documents
      - S3_ACCESS_KEY=minio_admin
      - S3_SECRET_KEY=minio_dev_password
      - MALWARE_SCANNER=clamav
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - evidentis-network

  # ============================================================
  # Next.js Frontend
  # ============================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.web
    container_name: evidentis-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    networks:
      - evidentis-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  ollama_data:
  model_cache:

networks:
  evidentis-network:
    driver: bridge
