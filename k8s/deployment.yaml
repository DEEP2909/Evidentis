# EvidentIS Kubernetes Deployment
# Production-ready configuration with autoscaling and secrets management
---
apiVersion: v1
kind: Namespace
metadata:
  name: evidentis
  labels:
    app.kubernetes.io/name: evidentis
    app.kubernetes.io/component: namespace

---
# External Secrets (AWS Secrets Manager / HashiCorp Vault)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: evidentis-secrets
  namespace: evidentis
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: evidentis-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: evidentis/production/database
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: evidentis/production/redis
        property: url
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: evidentis/production/jwt
        property: private_key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: evidentis/production/jwt
        property: public_key
    - secretKey: APP_ENCRYPTION_KEY
      remoteRef:
        key: evidentis/production/encryption
        property: key
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: evidentis/production/razorpay
        property: key_id
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: evidentis/production/razorpay
        property: key_secret
    - secretKey: RAZORPAY_WEBHOOK_SECRET
      remoteRef:
        key: evidentis/production/razorpay
        property: webhook_secret
    - secretKey: MSG91_AUTH_KEY
      remoteRef:
        key: evidentis/production/msg91
        property: auth_key
    - secretKey: INDIANKANOON_API_KEY
      remoteRef:
        key: evidentis/production/indiankanoon
        property: api_key
    - secretKey: ECOURTS_API_KEY
      remoteRef:
        key: evidentis/production/ecourts
        property: api_key
    - secretKey: AI_SERVICE_INTERNAL_KEY
      remoteRef:
        key: evidentis/production/ai-service
        property: internal_key

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: evidentis-config
  namespace: evidentis
data:
  NODE_ENV: "production"
  PORT: "4000"
  AI_SERVICE_URL: "http://ai-service:5000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "evidentis-api"
  MALWARE_SCANNER: "clamav"
  CLAMAV_HOST: "clamav"
  CLAMAV_PORT: "3310"

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: evidentis
  labels:
    app: evidentis-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evidentis-api
  template:
    metadata:
      labels:
        app: evidentis-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: evidentis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: evidentis/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: evidentis-config
            - secretRef:
                name: evidentis-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: evidentis-api
                topologyKey: kubernetes.io/hostname

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: evidentis
spec:
  selector:
    app: evidentis-api
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  type: ClusterIP

---
# API HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: evidentis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# AI Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: evidentis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evidentis-ai-service
  template:
    metadata:
      labels:
        app: evidentis-ai-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ai-service
          image: evidentis/ai-service:latest
          ports:
            - containerPort: 5000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: EMBEDDING_MODEL
              value: "sentence-transformers/LaBSE"
            - name: EMBEDDING_DIM
              value: "768"
            - name: GPU_ENABLED
              value: "false"
            - name: AI_SERVICE_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: AI_SERVICE_INTERNAL_KEY
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10

---
# AI Service
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: evidentis
spec:
  selector:
    app: evidentis-ai-service
  ports:
    - port: 5000
      targetPort: 5000

---
# Web Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: evidentis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evidentis-web
  template:
    metadata:
      labels:
        app: evidentis-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: web
          image: evidentis/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.evidentis.tech"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Web Service
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: evidentis
spec:
  selector:
    app: evidentis-web
  ports:
    - port: 3000
      targetPort: 3000

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evidentis-ingress
  namespace: evidentis
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - evidentis.tech
        - api.evidentis.tech
      secretName: evidentis-tls
  rules:
    - host: evidentis.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api.evidentis.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000

---
# PodDisruptionBudget for API
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: evidentis
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: evidentis-api

---
# NetworkPolicy - Restrict pod-to-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-network-policy
  namespace: evidentis
spec:
  podSelector:
    matchLabels:
      app: evidentis-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 4000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: evidentis-ai-service
      ports:
        - port: 5000
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evidentis
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evidentis
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: evidentis-api
  namespace: evidentis

---
# Worker Deployment (Issue #1 fix - BullMQ document processing workers)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: evidentis
  labels:
    app: evidentis-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evidentis-worker
  template:
    metadata:
      labels:
        app: evidentis-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: evidentis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker
          image: evidentis/api:latest
          command: ["node", "dist/worker-main.js"]
          ports:
            - containerPort: 9101
              name: metrics
          envFrom:
            - secretRef:
                name: evidentis-secrets
            - configMapRef:
                name: evidentis-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # Worker app has no business HTTP port; expose only metrics and use exec liveness probe
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - |
                  const fs = require('node:fs');
                  const heartbeatPath = '/tmp/worker-heartbeat';
                  if (!fs.existsSync(heartbeatPath)) process.exit(1);
                  const timestamp = Date.parse(fs.readFileSync(heartbeatPath, 'utf8').trim());
                  if (Number.isNaN(timestamp)) process.exit(1);
                  const ageSeconds = Math.floor((Date.now() - timestamp) / 1000);
                  process.exit(ageSeconds < 90 ? 0 : 1);
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: evidentis-worker
                topologyKey: kubernetes.io/hostname

---
# Celery Worker Deployment (Python scheduled/background tasks)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: evidentis
  labels:
    app: evidentis-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evidentis-celery-worker
  template:
    metadata:
      labels:
        app: evidentis-celery-worker
    spec:
      serviceAccountName: evidentis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: celery-worker
          image: evidentis/ai-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - celery_app
            - worker
            - -l
            - INFO
            - -c
            - "4"
            - -Q
            - default,embeddings,reports,notifications,analytics,cleanup
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: REDIS_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: DATABASE_URL
            - name: API_SERVICE_URL
              value: "http://api:4000"
            - name: AI_SERVICE_URL
              value: "http://ai-service:5000"
            - name: AI_SERVICE_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: AI_SERVICE_INTERNAL_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A celery_app inspect ping -d "celery@$HOSTNAME" --timeout=5
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 10

---
# Celery Beat Deployment (single scheduler instance)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: evidentis
  labels:
    app: evidentis-celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidentis-celery-beat
  template:
    metadata:
      labels:
        app: evidentis-celery-beat
    spec:
      serviceAccountName: evidentis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: celery-beat
          image: evidentis/ai-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - celery_app
            - beat
            - -l
            - INFO
            - --scheduler
            - celery.beat:PersistentScheduler
            - --pidfile=/tmp/celerybeat.pid
            - --schedule=/tmp/celerybeat-schedule
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: DATABASE_URL
            - name: API_SERVICE_URL
              value: "http://api:4000"
            - name: AI_SERVICE_URL
              value: "http://ai-service:5000"
            - name: AI_SERVICE_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: evidentis-secrets
                  key: AI_SERVICE_INTERNAL_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - test -f /tmp/celerybeat.pid && kill -0 "$(cat /tmp/celerybeat.pid)"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 10

---
# Celery Worker PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: celery-worker-pdb
  namespace: evidentis
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: evidentis-celery-worker

---
# NetworkPolicy for Celery Worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: celery-worker-network-policy
  namespace: evidentis
spec:
  podSelector:
    matchLabels:
      app: evidentis-celery-worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: evidentis-api
      ports:
        - port: 4000
    - to:
        - podSelector:
            matchLabels:
              app: evidentis-ai-service
      ports:
        - port: 5000
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evidentis
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379

---
# Worker PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: evidentis
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: evidentis-worker

---
# NetworkPolicy for Worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-network-policy
  namespace: evidentis
spec:
  podSelector:
    matchLabels:
      app: evidentis-worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []  # Workers don't accept incoming connections
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: evidentis-ai-service
      ports:
        - port: 5000
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evidentis
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: evidentis
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: clamav
      ports:
        - port: 3310
